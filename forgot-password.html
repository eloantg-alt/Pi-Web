<!DOCTYPE html>
<html> 
    <head>
        <meta charset="UTF-8">
        <meta name="color-scheme" content="light dark">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="PNG/debian-icon.png" type="image/png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="login-style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet">
        <title>Pi - Forgot password</title>
    </head>

    <body class="login-body">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="login-wrapper">
            <div class="login-card" id="login-card">

                <p style="font-family:'Syne',sans-serif; font-size:1.1rem; color:#fff; margin:0 0 0.5rem 0;" data-i18n="forgot.title"></p>
                <p class="login-subtitle" data-i18n="forgot.subtitle"></p>
                
                <div class="field-group">
                    <label>Email</label>
                    <input type="email" id="field-email" placeholder="nom@mail.com" oninput="clearErr()">
                </div>
                
                <span class="error-msg global-error" id="error-msg"></span>
                <span class="error-msg global-error" id="success-msg" style="color:#4caf50; min-height:1rem; display:block; text-align:center; margin-bottom:0.5rem;"></span>

                <button class="login-btn" onclick="handleForgot()" data-i18n="forgot.button"></button>

                <p style="text-align:center; margin: top 0.8rem;;">
                    <a href="login.html" style="font-family:'DM Mono',monospace; font-size:0.75rem; color:#555; text-decoration:none;" data-i18n="forgot.back"></a>  
                </p>

            </div>
        </div>
        <script src="i18n.js"></script>
        <script src="forgot-password.js"></script>

    </body>
</html>
