<!DOCTYPE html>
<html> 
    <head>
        <meta charset="UTF-8">
        <meta name="color-scheme" content="light dark">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="PNG/debian-icon.png" type="image/png">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="login-style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet">
        <title>Pi - Forgot password</title>
    </head>

    <body class="login-body">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>

        <div class="login-wrapper">
            <div class="login-card" id="login-card">

                <p style="font-family:'Syne',sans-serif; font-size:1.1rem; color:#fff; margin:0 0 0.5rem 0;" data-i18n="forgot.title"></p>
                <p class="login-subtitle" data-i18n="forgot.subtitle"></p>
                
                <div class="field-group">
                    <label>Email</label>
                    <input type="email" id="field-email" placeholder="nom@mail.com" oninput="clearErr()">
                </div>
                
            </div>

        </div>

    </body>
</html>
